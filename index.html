<!DOCTYPE html>
<html>
<head>
    <title>AR Sergisi Kamera</title>
    <!-- Artırılmış Gerçeklik (AR) Kütüphaneleri -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- Ekranda üstte duracak ipucu yazısı -->
    <div style="position: absolute; top: 20px; width: 100%; text-align: center; z-index: 1;">
        <span style="background-color: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 10px; font-family: sans-serif;">
            Sürpriz için kamerayı resme doğru tutun 📷
        </span>
    </div>

    <!-- AR Sahnesi Başlıyor -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

        <!-- SENİN YÜKLEDİĞİN PATT DOSYASI BURADA ARANIYOR -->
        <!-- Kameran bu deseni görünce tetiklenecek -->
        <a-marker type="pattern" url="qr/pattern-ar_projesi.patt" id="sihirli-resim">
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- Kamera Resmi Bulunca Ne Olacak? -->
    <script>
        // Sihirli resmi (marker) dinliyoruz
        var marker = document.querySelector('#sihirli-resim');
        
        marker.addEventListener('markerFound', function() {
            // Kamera senin resmini gördüğü ANDA animasyon sayfasına git!
            window.location.href = "video.html";
        });
    </script>

</body>
</html>
