<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Yükleme ekranı için basit bir stil */
      #scanning-overlay {
        display: flex; align-items: center; justify-content: center;
        position: absolute; left: 0; right: 0; top: 0; bottom: 0;
        background: rgba(0,0,0,0.5); color: white; z-index: 10; font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay">Resmi Taratın...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" src="14 şubat kanlı gerçek.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="video-target">
        <a-video src="#arVideo" width="1" height="0.55" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#arVideo');
      const targetEl = document.querySelector('#video-target');
      const overlay = document.querySelector('#scanning-overlay');

      // Resim bulunduğunda videoyu oynat
      targetEl.addEventListener("targetFound", event => {
        console.log("Hedef bulundu");
        video.play();
        overlay.style.display = "none";
      });

      // Resim kaybolduğunda videoyu durdur
      targetEl.addEventListener("targetLost", event => {
        console.log("Hedef kayboldu");
        video.pause();
      });
    </script>
  </body>
</html>
