<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Video Projesi</title>
    
    <!-- A-Frame ve MindAR Kütüphaneleri -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      /* Ekrana dokunma uyarısı (Tarayıcılar videonun sesini otomatik açmaz, dokunmak gerekir) */
      #tap-to-play {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 20px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        z-index: 999;
        text-align: center;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    
    <div id="tap-to-play">Sesi açmak için ekrana dokunun</div>

    <!-- AR Sahnesi Başlangıcı -->
    <!-- imageTargetSrc kısmına kendi mind dosyanı yazıyorsun -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <!-- Yüklenecek Medyalar -->
      <a-assets>
        <!-- Videonun dosya adı buraya yazılır -->
        <video id="ar-video" src="./ondortsubatkanligercek.mp4" playsinline webkit-playsinline loop crossorigin="anonymous" muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Resim Tanındığında Çalışacak Obje (Hedef 0) -->
      <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
        <!-- Video Boyutları (Genişlik 1, Yükseklik video oranına göre ayarlandı. İstersen değiştirebilirsin) -->
        <a-video src="#ar-video" position="0 0 0" width="1" height="0.56"></a-video>
      </a-entity>
      
    </a-scene>

    <!-- Videoyu Oynatma ve Durdurma Mantığı (JavaScript) -->
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const target = document.querySelector('#target-entity');
        const video = document.querySelector('#ar-video');
        const tapToPlay = document.querySelector('#tap-to-play');
        let isMuted = true;

        // Ekrana dokunulduğunda videonun sesini aç
        window.addEventListener('click', () => {
          if (isMuted) {
            video.muted = false;
            isMuted = false;
            tapToPlay.style.display = 'none'; // Uyarı yazısını gizle
          }
        });

        // Kamera resmi gördüğünde:
        target.addEventListener("targetFound", event => {
          console.log("Resim bulundu, video başlıyor!");
          video.play();
        });

        // Kamera resmi kaybettiğinde (farklı yöne bakıldığında):
        target.addEventListener("targetLost", event => {
          console.log("Resim kaybedildi, video duraklatılıyor.");
          video.pause();
        });
      });
    </script>
  </body>
</html>
