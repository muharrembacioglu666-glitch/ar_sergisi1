<!DOCTYPE html>
<html>
<head>
    <title>Sürpriz</title>
    <style>
        body {
            background-color: #2b0000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }

        /* Tıklanabilir Çerçeve */
        .cerceve {
            position: relative;
            width: 90%;
            max-width: 600px;
            cursor: pointer; /* Üzerine gelince el işareti çıkar */
            transition: transform 0.3s;
        }

        .cerceve:active {
            transform: scale(0.95); /* Tıklayınca hafif küçülme efekti */
        }

        /* Resim */
        .ana-resim {
            width: 100%;
            display: block;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 0, 50, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* "Dokun" Yazısı (İpucu) */
        .ipucu {
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Courier New', Courier, monospace;
            margin-top: 20px;
            font-size: 18px;
            letter-spacing: 2px;
            animation: parala 2s infinite;
        }

        @keyframes parala {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- RESME TIKLAYINCA video.html SAYFASINA GİDER -->
    <a href="video.html" class="cerceve">
        <!-- Senin resmin (sevgi.jpg) -->
        <img src="sevgi.jpg" class="ana-resim" alt="Sürpriz">
    </a>

    <div class="ipucu">👆 Sürpriz İçin Resme Dokun</div>

</body>
</html>
